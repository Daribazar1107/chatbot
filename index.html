<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Их Сургуулийн Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f2044;
      --blue: #1a56db;
      --blue-light: #3b82f6;
      --accent: #f59e0b;
      --bg: #f0f4ff;
      --white: #ffffff;
      --gray: #64748b;
      --gray-light: #e2e8f0;
      --user-bubble: #1a56db;
      --bot-bubble: #ffffff;
      --text-dark: #1e293b;
      --shadow: 0 4px 24px rgba(15,32,68,0.10);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* HEADER */
    .header {
      width: 100%;
      max-width: 820px;
      background: var(--navy);
      border-radius: 20px 20px 0 0;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-icon {
      width: 52px; height: 52px;
      background: var(--blue);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .header-text h1 {
      color: var(--white);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      color: #94a3b8;
      font-size: 0.82rem;
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      color: #86efac;
      font-size: 0.8rem;
    }

    .dot {
      width: 9px; height: 9px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* CHAT WRAPPER */
    .chat-wrapper {
      width: 100%;
      max-width: 820px;
      background: var(--white);
      display: flex;
      flex-direction: column;
      height: 62vh;
      box-shadow: var(--shadow);
    }

    /* QUICK QUESTIONS */
    .quick-bar {
      padding: 14px 24px;
      background: #f8faff;
      border-bottom: 1px solid var(--gray-light);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-btn {
      background: #eff6ff;
      border: 1.5px solid #bfdbfe;
      color: var(--blue);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: var(--blue);
      color: var(--white);
      border-color: var(--blue);
    }

    /* MESSAGES */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar { width: 5px; }
    #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .bot-avatar { background: #dbeafe; }
    .user-avatar { background: var(--blue); color: white; font-size: 14px; font-weight: 700; }

    .bubble {
      max-width: 70%;
      padding: 13px 18px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-dark);
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1.5px solid var(--gray-light);
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 5px;
    }

    /* TYPING */
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* WELCOME MESSAGE */
    .welcome {
      text-align: center;
      padding: 20px 0;
      color: var(--gray);
    }
    .welcome h3 { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .welcome p { font-size: 0.82rem; }

    /* INPUT */
    .input-area {
      border-top: 1.5px solid var(--gray-light);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: white;
      border-radius: 0 0 0 0;
    }

    #user-input {
      flex: 1;
      border: 1.5px solid var(--gray-light);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text-dark);
    }

    #user-input:focus { border-color: var(--blue-light); }

    #send-btn {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      width: 46px; height: 46px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    #send-btn:disabled { background: #93c5fd; cursor: default; transform: none; }

    /* FOOTER */
    .footer {
      width: 100%;
      max-width: 820px;
      background: var(--navy);
      border-radius: 0 0 20px 20px;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span {
      color: #64748b;
      font-size: 0.75rem;
    }

    #reset-btn {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    #reset-btn:hover { border-color: #ef4444; color: #ef4444; }

    @media (max-width: 860px) {
      .header, .chat-wrapper, .footer { border-radius: 0; max-width: 100%; }
      body { justify-content: flex-start; }
      .chat-wrapper { height: 70vh; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">🎓</div>
    <div class="header-text">
      <h1>Их Сургуулийн Туслах</h1>
      <p>Таны асуултад 24/7 хариулна</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      Онлайн
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-wrapper">
    <div class="quick-bar">
      <button class="quick-btn" onclick="quickAsk('Элсэлтийн шаардлага')">📋 Элсэлт</button>
      <button class="quick-btn" onclick="quickAsk('Сургалтын төлбөр хэд вэ?')">💰 Төлбөр</button>
      <button class="quick-btn" onclick="quickAsk('Ямар факультетүүд байдаг вэ?')">🏛️ Факультет</button>
      <button class="quick-btn" onclick="quickAsk('Номын сангийн цаг')">📚 Номын сан</button>
      <button class="quick-btn" onclick="quickAsk('Холбоо барих')">📞 Холбоо</button>
    </div>

    <div id="chat-box">
      <div class="welcome">
        <h3>👋 Сайн байна уу!</h3>
        <p>Би Их Сургуулийн туслах bot. Ямар асуулт байна?</p>
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="Асуулт бичнэ үү..." autocomplete="off" />
      <button id="send-btn" onclick="sendMessage()" title="Илгээх">➤</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>Powered by Claude AI</span>
    <button id="reset-btn" onclick="resetChat()">🔄 Шинэ яриа</button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Enter товч дарахад илгээнэ
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function quickAsk(text) {
      input.value = text;
      sendMessage();
    }

    function addMessage(text, role) {
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role === 'bot' ? 'bot-avatar' : 'user-avatar'}`;
      avatar.textContent = role === 'bot' ? '🎓' : 'Та';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = text.replace(/\n/g, '<br>');

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.id = 'typing';
      msg.innerHTML = `
        <div class="avatar bot-avatar">🎓</div>
        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
      `;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      sendBtn.disabled = true;

      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        removeTyping();

        if (data.reply) {
          addMessage(data.reply, 'bot');
        } else {
          addMessage('⚠️ Алдаа гарлаа. Дахин оролдоно уу.', 'bot');
        }
      } catch (err) {
        removeTyping();
        addMessage('⚠️ Сервертэй холбогдох боломжгүй байна.', 'bot');
      }

      sendBtn.disabled = false;
      input.focus();
    }

    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      chatBox.innerHTML = `
        <div class="welcome">
          <h3>👋 Шинэ яриа эхэллээ!</h3>
          <p>Ямар асуулт байна?</p>
        </div>`;
    }
  </script>

</body>
</html>
